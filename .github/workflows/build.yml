name: Simple .NET Framework Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_FILE: CyberCafeUsbManager.sln
  PROJECT_NAME: CyberCafeUsbManager
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Restore NuGet packages
      run: |
        echo "Configuring NuGet sources..."
        # Add official NuGet source explicitly
        dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org
        
        echo "Restoring NuGet packages with detailed logging..."
        # Try dotnet restore with detailed output
        dotnet restore ${{ env.SOLUTION_FILE }} --verbosity detailed || (
          echo "dotnet restore failed, trying nuget restore with explicit source..."
          nuget sources Add -Name "nuget.org" -Source "https://api.nuget.org/v3/index.json"
          nuget restore ${{ env.SOLUTION_FILE }} -Verbosity detailed
        )
        echo "NuGet restore completed"
        
    - name: Build project
      run: |
        echo "Building project..."
        msbuild ${{ env.SOLUTION_FILE }} `
          /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
          /p:Platform="Any CPU" `
          /verbosity:minimal
        
        if ($LASTEXITCODE -eq 0) {
          echo "Build successful!"
        } else {
          echo "Build failed!"
          exit 1
        }
        
    - name: Verify output
      run: |
        echo "Verifying output files..."
        $exePath = "${{ env.PROJECT_NAME }}/bin/${{ env.BUILD_CONFIGURATION }}/${{ env.PROJECT_NAME }}.exe"
        
        if (Test-Path $exePath) {
          $size = (Get-Item $exePath).Length
          echo "✅ EXE file found: $exePath ($size bytes)"
        } else {
          echo "❌ EXE file not found: $exePath"
          Get-ChildItem -Recurse -Filter "*.exe" | ForEach-Object { echo "Found EXE: $($_.FullName)" }
          exit 1
        }
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: cybercafe-usb-manager
        path: ${{ env.PROJECT_NAME }}/bin/${{ env.BUILD_CONFIGURATION }}/
        retention-days: 1