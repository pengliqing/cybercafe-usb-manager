name: .NET Framework 4.7.2 Build - CyberCafe USB Manager

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发构建

env:
  SOLUTION_FILE: CyberCafeUsbManager.sln
  PROJECT_NAME: CyberCafeUsbManager
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Any CPU

jobs:
  build:
    runs-on: windows-latest  # 必须使用Windows环境，因为项目依赖.NET Framework
    
    steps:
    # 步骤1: 检出代码
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    # 步骤2: 设置MSBuild环境
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    # 步骤3: 设置NuGet
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      with:
        nuget-version: '5.x'
        
    # 步骤4: 添加NuGet源（确保包可下载）
    - name: Configure NuGet sources
      run: |
        nuget sources Add -Name "nuget.org" -Source "https://api.nuget.org/v3/index.json"
        nuget sources list
        
    # 步骤5: 恢复NuGet包
    - name: Restore NuGet packages
      run: |
        echo "恢复NuGet包..."
        nuget restore "${{ env.SOLUTION_FILE }}"
        if ($LASTEXITCODE -ne 0) {
          Write-Error "NuGet包恢复失败"
          exit 1
        }
        echo "NuGet包恢复成功"
        
    # 步骤6: 编译项目
    - name: Build with MSBuild
      run: |
        echo "开始编译项目..."
        msbuild "${{ env.SOLUTION_FILE }}" `
          /p:Configuration="${{ env.BUILD_CONFIGURATION }}" `
          /p:Platform="${{ env.BUILD_PLATFORM }}" `
          /p:DeployOnBuild=true `
          /verbosity:minimal `
          /p:WarningLevel=0
          
        if ($LASTEXITCODE -ne 0) {
          Write-Error "编译失败"
          exit 1
        }
        echo "编译成功"
        
    # 步骤7: 验证输出文件
    - name: Verify output files
      run: |
        echo "验证输出文件..."
        $outputDir = "${{ env.PROJECT_NAME }}\bin\${{ env.BUILD_CONFIGURATION }}\"
        
        # 检查目录是否存在
        if (-not (Test-Path $outputDir)) {
          Write-Error "输出目录不存在: $outputDir"
          exit 1
        }
        
        # 检查主要文件
        $requiredFiles = @(
          "${{ env.PROJECT_NAME }}.exe",
          "Newtonsoft.Json.dll",
          "log4net.dll",
          "TaskScheduler.dll",
          "${{ env.PROJECT_NAME }}.exe.config"
        )
        
        foreach ($file in $requiredFiles) {
          $filePath = Join-Path $outputDir $file
          if (-not (Test-Path $filePath)) {
            Write-Warning "文件不存在: $file"
          } else {
            $size = (Get-Item $filePath).Length
            echo "✓ $file - $size bytes"
          }
        }
        
        # 检查EXE文件大小（应大于50KB）
        $exePath = Join-Path $outputDir "${{ env.PROJECT_NAME }}.exe"
        $exeSize = (Get-Item $exePath).Length
        if ($exeSize -lt 50000) {
          Write-Warning "EXE文件大小异常: $exeSize bytes (预期 > 50KB)"
        } else {
          echo "✅ EXE文件大小正常: $exeSize bytes"
        }
        
        # 列出所有文件
        echo "`n输出目录内容:"
        dir $outputDir | Format-Table Name, Length, LastWriteTime
        
    # 步骤8: 创建部署包结构
    - name: Create deployment package
      run: |
        echo "创建部署包..."
        
        # 创建目录结构
        $deployDir = "deployment-package"
        $subDirs = @("主程序", "配置文件", "脚本工具", "说明文档", "驱动程序\Logitech", "驱动程序\Razer", "驱动程序\SteelSeries")
        
        foreach ($dir in $subDirs) {
          $fullPath = Join-Path $deployDir $dir
          New-Item -ItemType Directory -Force -Path $fullPath | Out-Null
        }
        
        # 复制主程序文件
        $sourceDir = "${{ env.PROJECT_NAME }}\bin\${{ env.BUILD_CONFIGURATION }}\"
        $targetDir = Join-Path $deployDir "主程序"
        
        if (Test-Path $sourceDir) {
          Copy-Item "$sourceDir\*" -Destination $targetDir -Recurse -Force
          echo "复制主程序文件完成"
        }
        
        # 复制配置文件
        $configFiles = @(
          @{Source="usb_device_database.json"; Target="配置文件"},
          @{Source="${{ env.PROJECT_NAME }}\app.config"; Target="配置文件\app.config.example"}
        )
        
        foreach ($file in $configFiles) {
          if (Test-Path $file.Source) {
            $targetPath = Join-Path $deployDir $file.Target
            Copy-Item $file.Source -Destination $targetPath -Force -ErrorAction SilentlyContinue
            echo "复制配置文件: $($file.Source) → $($file.Target)"
          }
        }
        
        # 复制脚本工具（如果存在）
        if (Test-Path "scripts") {
          $targetScriptDir = Join-Path $deployDir "脚本工具"
          Copy-Item "scripts\*.bat" -Destination $targetScriptDir -Recurse -Force
          echo "复制脚本工具完成"
        }
        
        # 复制说明文档（如果存在）
        $docsSource = "部署包\说明文档"
        if (Test-Path $docsSource) {
          $targetDocsDir = Join-Path $deployDir "说明文档"
          Copy-Item "$docsSource\*" -Destination $targetDocsDir -Recurse -Force
          echo "复制说明文档完成"
        } else {
          # 创建基本文档
          $readmeContent = @"
网吧USB管理软件 - 云编译部署包
==================================

编译信息:
- 编译时间: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
- 编译环境: GitHub Actions Windows
- 运行ID: ${{ github.run_id }}
- 提交: ${{ github.sha }}

文件说明:
1. 主程序/ - 编译好的可执行文件
2. 配置文件/ - 配置文件示例
3. 脚本工具/ - 安装和管理脚本
4. 说明文档/ - 使用说明

安装步骤:
1. 运行"脚本工具/安装服务.bat"（管理员权限）
2. 插入USB设备测试识别
3. 查看事件查看器日志

技术支持:
- 开发者: 络络 (OpenClaw AI助手)
- 问题反馈: 提供错误日志和截图
"@
          
          $readmePath = Join-Path $deployDir "说明文档\README.txt"
          $readmeContent | Out-File -FilePath $readmePath -Encoding UTF8
          echo "创建基本文档完成"
        }
        
        # 创建部署包README
        $packageReadme = @"
网吧USB管理软件 - 完整部署包
===============================

本包由GitHub Actions云编译生成，包含网吧USB管理软件的所有必要文件。

目录结构:
├── 主程序/           # 编译好的程序文件
├── 配置文件/         # 配置文件和数据库
├── 脚本工具/         # 安装和管理脚本
├── 驱动程序/         # 品牌驱动程序目录（可添加）
└── 说明文档/         # 使用文档

使用步骤:
1. 将整个文件夹复制到网吧机器
2. 进入"脚本工具"目录
3. 右键"安装服务.bat" → "以管理员身份运行"
4. 插入USB设备测试功能

编译信息:
- 时间: $(Get-Date -Format 'yyyy年MM月dd日 HH:mm:ss')
- 平台: Windows Server 2022
- 工具: MSBuild + .NET Framework 4.7.2
- 版本: ${{ github.sha }}

注意事项:
1. 需要Windows 10/11操作系统
2. 需要.NET Framework 4.7.2运行时
3. 安装需要管理员权限
4. 建议先在测试环境验证

问题反馈:
请提供错误截图和事件查看器日志。
"@
        
        $packageReadmePath = Join-Path $deployDir "README.txt"
        $packageReadme | Out-File -FilePath $packageReadmePath -Encoding UTF8
        
        echo "部署包创建完成"
        echo "部署包结构:"
        Get-ChildItem $deployDir -Recurse | Select-Object FullName | Format-Table -AutoSize
        
    # 步骤9: 创建ZIP压缩包
    - name: Create ZIP package
      run: |
        echo "创建ZIP压缩包..."
        
        $zipFileName = "网吧USB管理软件_云编译部署包.zip"
        $deployDir = "deployment-package"
        
        # 检查部署包目录
        if (-not (Test-Path $deployDir)) {
          Write-Error "部署包目录不存在: $deployDir"
          exit 1
        }
        
        # 创建ZIP文件
        Compress-Archive -Path "$deployDir\*" -DestinationPath $zipFileName -Force
        
        $zipSize = (Get-Item $zipFileName).Length
        $zipSizeMB = [math]::Round($zipSize / 1MB, 2)
        
        echo "✅ ZIP包创建成功: $zipFileName"
        echo "   大小: $zipSize bytes ($zipSizeMB MB)"
        echo "   包含目录:"
        dir $deployDir | Select-Object Name, LastWriteTime | Format-Table -AutoSize
        
    # 步骤10: 上传构建产物
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: CyberCafeUsbManager-编译结果
        path: |
          ${{ env.PROJECT_NAME }}/bin/${{ env.BUILD_CONFIGURATION }}/
          deployment-package/
        retention-days: 30
        
    # 步骤11: 上传ZIP包
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v3
      with:
        name: 网吧USB管理软件_完整部署包
        path: 网吧USB管理软件_云编译部署包.zip
        retention-days: 30
        
    # 步骤12: 构建成功通知
    - name: Build success summary
      if: success()
      run: |
        echo "========================================"
        echo "✅ 编译成功完成！"
        echo "========================================"
        echo ""
        echo "构建信息:"
        echo "- 项目: ${{ env.PROJECT_NAME }}"
        echo "- 配置: ${{ env.BUILD_CONFIGURATION }}"
        echo "- 平台: ${{ env.BUILD_PLATFORM }}"
        echo "- 运行ID: ${{ github.run_id }}"
        echo "- 提交: ${{ github.sha }}"
        echo ""
        echo "输出文件:"
        $exePath = "${{ env.PROJECT_NAME }}\bin\${{ env.BUILD_CONFIGURATION }}\${{ env.PROJECT_NAME }}.exe"
        if (Test-Path $exePath) {
          $exeSize = (Get-Item $exePath).Length
          echo "- 主程序: $exeSize bytes"
        }
        
        $zipPath = "网吧USB管理软件_云编译部署包.zip"
        if (Test-Path $zipPath) {
          $zipSize = (Get-Item $zipPath).Length
          $zipSizeMB = [math]::Round($zipSize / 1MB, 2)
          echo "- ZIP包: $zipSize bytes ($zipSizeMB MB)"
        }
        echo ""
        echo "下一步:"
        echo "1. 在Artifacts中下载'网吧USB管理软件_完整部署包'"
        echo "2. 解压到网吧机器进行测试"
        echo "3. 运行'脚本工具/安装服务.bat'（管理员权限）"
        echo "4. 插入USB设备验证识别功能"
        echo "========================================"
        
    # 步骤13: 构建失败处理
    - name: Build failure summary
      if: failure()
      run: |
        echo "========================================"
        echo "❌ 编译失败！"
        echo "========================================"
        echo ""
        echo "可能原因:"
        echo "1. NuGet包恢复失败"
        echo "2. 项目文件错误"
        echo "3. 依赖库缺失"
        echo "4. MSBuild配置问题"
        echo ""
        echo "排查步骤:"
        echo "1. 检查项目文件格式"
        echo "2. 验证NuGet包源"
        echo "3. 查看详细构建日志"
        echo "4. 在Windows环境本地测试编译"
        echo ""
        echo "技术支持:"
        echo "- 开发者: 络络 (OpenClaw AI助手)"
        echo "- 提供完整错误日志"
        echo "========================================"